<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aya Sim Lab - Color Mixing</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #fdf6ff, #eaf7ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 800px;
      background: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #333;
    }

    .subtitle {
      color: #666;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .color-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .color-btn {
      width: 90px;
      height: 90px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    .color-btn:hover {
      transform: scale(1.08);
    }

    .color-btn.selected {
      outline: 5px solid #333;
      outline-offset: 4px;
    }

    .mix-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .bowl {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 10px solid #ddd;
      background: #fafafa;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #444;
      transition: background 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .result-text {
      font-size: 1.4rem;
      font-weight: bold;
      color: #333;
      min-height: 32px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button.action-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      background: #4f8cff;
      color: white;
      transition: background 0.2s ease;
    }

    button.action-btn:hover {
      background: #3b73db;
    }

    button.reset-btn {
      background: #ff7b7b;
    }

    button.reset-btn:hover {
      background: #e25f5f;
    }

    .selected-colors {
      margin-top: 16px;
      color: #555;
      font-size: 1rem;
      min-height: 24px;
    }

    .sparkle {
      position: absolute;
      font-size: 2rem;
      animation: pop 0.7s ease forwards;
      opacity: 0;
    }

    @keyframes pop {
      0% {
        transform: scale(0.3) translateY(10px);
        opacity: 0;
      }
      50% {
        transform: scale(1.2) translateY(-10px);
        opacity: 1;
      }
      100% {
        transform: scale(1) translateY(-20px);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.6rem;
      }

      .color-btn {
        width: 75px;
        height: 75px;
      }

      .bowl {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🎨 Color Mixing Lab</h1>
    <p class="subtitle">Pick 2 colors, then mix them!</p>

    <div class="color-buttons">
      <button class="color-btn" data-color="red" style="background: red;" aria-label="Red"></button>
      <button class="color-btn" data-color="yellow" style="background: yellow;" aria-label="Yellow"></button>
      <button class="color-btn" data-color="blue" style="background: blue;" aria-label="Blue"></button>
    </div>

    <div class="mix-area">
      <div class="bowl" id="bowl">Mix Here</div>
      <div class="result-text" id="resultText"></div>
      <div class="selected-colors" id="selectedColors">Selected: none</div>
    </div>

    <div class="controls">
      <button class="action-btn" id="mixBtn">Mix Colors</button>
      <button class="action-btn reset-btn" id="resetBtn">Reset</button>
    </div>
  </div>

  <script>
    const colorButtons = document.querySelectorAll(".color-btn");
    const selectedColorsText = document.getElementById("selectedColors");
    const resultText = document.getElementById("resultText");
    const bowl = document.getElementById("bowl");
    const mixBtn = document.getElementById("mixBtn");
    const resetBtn = document.getElementById("resetBtn");

    let selectedColors = [];

    const mixMap = {
      "red-yellow": { name: "Orange", color: "orange" },
      "yellow-red": { name: "Orange", color: "orange" },

      "red-blue": { name: "Purple", color: "purple" },
      "blue-red": { name: "Purple", color: "purple" },

      "blue-yellow": { name: "Green", color: "green" },
      "yellow-blue": { name: "Green", color: "green" },

      "red-red": { name: "Red", color: "red" },
      "yellow-yellow": { name: "Yellow", color: "yellow" },
      "blue-blue": { name: "Blue", color: "blue" }
    };

    function updateSelectedDisplay() {
      if (selectedColors.length === 0) {
        selectedColorsText.textContent = "Selected: none";
      } else {
        selectedColorsText.textContent = "Selected: " + selectedColors.join(" + ");
      }
    }

    function clearSelections() {
      selectedColors = [];
      colorButtons.forEach(btn => btn.classList.remove("selected"));
      updateSelectedDisplay();
    }

    function showSparkle() {
      const sparkle = document.createElement("div");
      sparkle.className = "sparkle";
      sparkle.textContent = "✨";
      sparkle.style.left = "50%";
      sparkle.style.top = "50%";
      sparkle.style.transform = "translate(-50%, -50%)";
      bowl.appendChild(sparkle);

      setTimeout(() => {
        sparkle.remove();
      }, 700);
    }

    colorButtons.forEach(button => {
      button.addEventListener("click", () => {
        const color = button.dataset.color;

        if (selectedColors.length < 2) {
          selectedColors.push(color);
          button.classList.add("selected");
        } else {
          alert("You can only pick 2 colors.");
        }

        updateSelectedDisplay();
      });
    });

    mixBtn.addEventListener("click", () => {
      if (selectedColors.length !== 2) {
        resultText.textContent = "Please pick 2 colors first.";
        return;
      }

      const key = `${selectedColors[0]}-${selectedColors[1]}`;
      const result = mixMap[key];

      if (result) {
        bowl.style.background = result.color;
        resultText.textContent = `You made ${result.name}!`;
        bowl.textContent = result.name;
        showSparkle();
      } else {
        bowl.style.background = "#fafafa";
        bowl.textContent = "Oops!";
        resultText.textContent = "That mix is not available yet.";
      }
    });

    resetBtn.addEventListener("click", () => {
      clearSelections();
      bowl.style.background = "#fafafa";
      bowl.textContent = "Mix Here";
      resultText.textContent = "";
    });

    updateSelectedDisplay();
  </script>
</body>
  </html>
