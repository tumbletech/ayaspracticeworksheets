<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aya Sim Lab - Color Mixing</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #fdf6ff, #eaf7ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      background: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #333;
    }

    .subtitle {
      color: #666;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .color-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 16px;
      max-width: 700px;
      margin: 0 auto 24px auto;
    }

    .color-option {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .color-btn {
      width: 90px;
      height: 90px;
      margin: 0 auto;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
      position: relative;
    }

    .color-btn:hover {
      transform: scale(1.08);
    }

    .color-btn.selected {
      outline: 5px solid #333;
      outline-offset: 4px;
    }

    .color-label {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #444;
      font-weight: bold;
      text-align: center;
    }

    .mix-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .bowl {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 10px solid #ddd;
      background: #fafafa;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #444;
      transition: background 0.3s ease, color 0.3s ease;
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 20px;
    }

    .result-text {
      font-size: 1.4rem;
      font-weight: bold;
      color: #333;
      min-height: 32px;
    }

    .selected-colors {
      margin-top: 8px;
      color: #555;
      font-size: 1rem;
      min-height: 24px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button.action-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      background: #4f8cff;
      color: white;
      transition: background 0.2s ease;
    }

    button.action-btn:hover {
      background: #3b73db;
    }

    button.reset-btn {
      background: #ff7b7b;
    }

    button.reset-btn:hover {
      background: #e25f5f;
    }

    .sparkle {
      position: absolute;
      font-size: 2rem;
      animation: pop 0.7s ease forwards;
      opacity: 0;
    }

    @keyframes pop {
      0% {
        transform: scale(0.3) translateY(10px);
        opacity: 0;
      }
      50% {
        transform: scale(1.2) translateY(-10px);
        opacity: 1;
      }
      100% {
        transform: scale(1) translateY(-20px);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.6rem;
      }

      .color-btn {
        width: 75px;
        height: 75px;
      }

      .bowl {
        width: 180px;
        height: 180px;
        font-size: 1rem;
      }

      .color-label {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🎨 Color Mixing Lab</h1>
    <p class="subtitle">Pick 2 colors, then mix them!</p>

    <div class="color-buttons">
      <!-- Primary Colors -->
      <div class="color-option">
        <button class="color-btn" data-color="red" style="background: red;" aria-label="Red"></button>
        <div class="color-label">Red</div>
      </div>

      <div class="color-option">
        <button class="color-btn" data-color="yellow" style="background: yellow;" aria-label="Yellow"></button>
        <div class="color-label">Yellow</div>
      </div>

      <div class="color-option">
        <button class="color-btn" data-color="blue" style="background: blue;" aria-label="Blue"></button>
        <div class="color-label">Blue</div>
      </div>

      <!-- Secondary Colors -->
      <div class="color-option">
        <button class="color-btn" data-color="orange" style="background: orange;" aria-label="Orange"></button>
        <div class="color-label">Orange</div>
      </div>

      <div class="color-option">
        <button class="color-btn" data-color="green" style="background: green;" aria-label="Green"></button>
        <div class="color-label">Green</div>
      </div>

      <div class="color-option">
        <button class="color-btn" data-color="purple" style="background: purple;" aria-label="Purple"></button>
        <div class="color-label">Purple</div>
      </div>

      <!-- Tertiary Colors -->
      <div class="color-option">
        <button class="color-btn" data-color="red-orange" style="background: #ff5349;" aria-label="Red-Orange"></button>
        <div class="color-label">Red-Orange</div>
      </div>

      <div class="color-option">
        <button class="color-btn" data-color="yellow-orange" style="background: #ffae42;" aria-label="Yellow-Orange"></button>
        <div class="color-label">Yellow-Orange</div>
      </div>

      <div class="color-option">
        <button class="color-btn" data-color="yellow-green" style="background: #9acd32;" aria-label="Yellow-Green"></button>
        <div class="color-label">Yellow-Green</div>
      </div>

      <div class="color-option">
        <button class="color-btn" data-color="blue-green" style="background: #0d98ba;" aria-label="Blue-Green"></button>
        <div class="color-label">Blue-Green</div>
      </div>

      <div class="color-option">
        <button class="color-btn" data-color="blue-purple" style="background: #6a5acd;" aria-label="Blue-Purple"></button>
        <div class="color-label">Blue-Purple</div>
      </div>

      <div class="color-option">
        <button class="color-btn" data-color="red-purple" style="background: #c71585;" aria-label="Red-Purple"></button>
        <div class="color-label">Red-Purple</div>
      </div>
    </div>

    <div class="mix-area">
      <div class="bowl" id="bowl">Mix Here</div>
      <div class="result-text" id="resultText"></div>
      <div class="selected-colors" id="selectedColors">Selected: none</div>
    </div>

    <div class="controls">
      <button class="action-btn" id="mixBtn">Mix Colors</button>
      <button class="action-btn reset-btn" id="resetBtn">Reset</button>
    </div>
  </div>

  <script>
    const colorButtons = document.querySelectorAll(".color-btn");
    const selectedColorsText = document.getElementById("selectedColors");
    const resultText = document.getElementById("resultText");
    const bowl = document.getElementById("bowl");
    const mixBtn = document.getElementById("mixBtn");
    const resetBtn = document.getElementById("resetBtn");

    let selectedColors = [];

    const colorDisplayNames = {
      red: "Red",
      yellow: "Yellow",
      blue: "Blue",
      orange: "Orange",
      green: "Green",
      purple: "Purple",
      "red-orange": "Red-Orange",
      "yellow-orange": "Yellow-Orange",
      "yellow-green": "Yellow-Green",
      "blue-green": "Blue-Green",
      "blue-purple": "Blue-Purple",
      "red-purple": "Red-Purple",
      brown: "Brown"
    };

    const mixMap = {
      // Primary + Primary
      "red-yellow": { name: "Orange", color: "orange", textColor: "#222" },
      "yellow-red": { name: "Orange", color: "orange", textColor: "#222" },

      "red-blue": { name: "Purple", color: "purple", textColor: "#fff" },
      "blue-red": { name: "Purple", color: "purple", textColor: "#fff" },

      "blue-yellow": { name: "Green", color: "green", textColor: "#fff" },
      "yellow-blue": { name: "Green", color: "green", textColor: "#fff" },

      // Same colors
      "red-red": { name: "Red", color: "red", textColor: "#fff" },
      "yellow-yellow": { name: "Yellow", color: "yellow", textColor: "#222" },
      "blue-blue": { name: "Blue", color: "blue", textColor: "#fff" },
      "orange-orange": { name: "Orange", color: "orange", textColor: "#222" },
      "green-green": { name: "Green", color: "green", textColor: "#fff" },
      "purple-purple": { name: "Purple", color: "purple", textColor: "#fff" },

      // Primary + Secondary
      "red-orange": { name: "Red-Orange", color: "#ff5349", textColor: "#fff" },
      "orange-red": { name: "Red-Orange", color: "#ff5349", textColor: "#fff" },

      "yellow-orange": { name: "Yellow-Orange", color: "#ffae42", textColor: "#222" },
      "orange-yellow": { name: "Yellow-Orange", color: "#ffae42", textColor: "#222" },

      "yellow-green": { name: "Yellow-Green", color: "#9acd32", textColor: "#222" },
      "green-yellow": { name: "Yellow-Green", color: "#9acd32", textColor: "#222" },

      "blue-green": { name: "Blue-Green", color: "#0d98ba", textColor: "#fff" },
      "green-blue": { name: "Blue-Green", color: "#0d98ba", textColor: "#fff" },

      "blue-purple": { name: "Blue-Purple", color: "#6a5acd", textColor: "#fff" },
      "purple-blue": { name: "Blue-Purple", color: "#6a5acd", textColor: "#fff" },

      "red-purple": { name: "Red-Purple", color: "#c71585", textColor: "#fff" },
      "purple-red": { name: "Red-Purple", color: "#c71585", textColor: "#fff" },

      // Secondary + Secondary
      "orange-green": { name: "Brown", color: "#8b5a2b", textColor: "#fff" },
      "green-orange": { name: "Brown", color: "#8b5a2b", textColor: "#fff" },

      "orange-purple": { name: "Brown", color: "#7b4b2a", textColor: "#fff" },
      "purple-orange": { name: "Brown", color: "#7b4b2a", textColor: "#fff" },

      "green-purple": { name: "Brown", color: "#6f4e37", textColor: "#fff" },
      "purple-green": { name: "Brown", color: "#6f4e37", textColor: "#fff" },

      // Tertiary + Same
      "red-orange-red-orange": { name: "Red-Orange", color: "#ff5349", textColor: "#fff" },
      "yellow-orange-yellow-orange": { name: "Yellow-Orange", color: "#ffae42", textColor: "#222" },
      "yellow-green-yellow-green": { name: "Yellow-Green", color: "#9acd32", textColor: "#222" },
      "blue-green-blue-green": { name: "Blue-Green", color: "#0d98ba", textColor: "#fff" },
      "blue-purple-blue-purple": { name: "Blue-Purple", color: "#6a5acd", textColor: "#fff" },
      "red-purple-red-purple": { name: "Red-Purple", color: "#c71585", textColor: "#fff" },

      // Neighboring tertiary colors
      "red-orange-yellow-orange": { name: "Orange", color: "orange", textColor: "#222" },
      "yellow-orange-red-orange": { name: "Orange", color: "orange", textColor: "#222" },

      "yellow-orange-yellow-green": { name: "Yellow", color: "yellow", textColor: "#222" },
      "yellow-green-yellow-orange": { name: "Yellow", color: "yellow", textColor: "#222" },

      "yellow-green-blue-green": { name: "Green", color: "green", textColor: "#fff" },
      "blue-green-yellow-green": { name: "Green", color: "green", textColor: "#fff" },

      "blue-green-blue-purple": { name: "Blue", color: "blue", textColor: "#fff" },
      "blue-purple-blue-green": { name: "Blue", color: "blue", textColor: "#fff" },

      "blue-purple-red-purple": { name: "Purple", color: "purple", textColor: "#fff" },
      "red-purple-blue-purple": { name: "Purple", color: "purple", textColor: "#fff" },

      "red-purple-red-orange": { name: "Red", color: "red", textColor: "#fff" },
      "red-orange-red-purple": { name: "Red", color: "red", textColor: "#fff" },

      // Opposite tertiary colors
      "red-orange-blue-green": { name: "Brown", color: "#7b4b2a", textColor: "#fff" },
      "blue-green-red-orange": { name: "Brown", color: "#7b4b2a", textColor: "#fff" },

      "yellow-orange-blue-purple": { name: "Brown", color: "#6f4e37", textColor: "#fff" },
      "blue-purple-yellow-orange": { name: "Brown", color: "#6f4e37", textColor: "#fff" },

      "yellow-green-red-purple": { name: "Brown", color: "#8b5a2b", textColor: "#fff" },
      "red-purple-yellow-green": { name: "Brown", color: "#8b5a2b", textColor: "#fff" }
    };

    function updateSelectedDisplay() {
      if (selectedColors.length === 0) {
        selectedColorsText.textContent = "Selected: none";
      } else {
        const names = selectedColors.map(color => colorDisplayNames[color] || color);
        selectedColorsText.textContent = "Selected: " + names.join(" + ");
      }
    }

    function clearSelections() {
      selectedColors = [];
      colorButtons.forEach(btn => btn.classList.remove("selected"));
      updateSelectedDisplay();
    }

    function showSparkle() {
      const sparkle = document.createElement("div");
      sparkle.className = "sparkle";
      sparkle.textContent = "✨";
      sparkle.style.left = "50%";
      sparkle.style.top = "50%";
      sparkle.style.transform = "translate(-50%, -50%)";
      bowl.appendChild(sparkle);

      setTimeout(() => {
        sparkle.remove();
      }, 700);
    }

    colorButtons.forEach(button => {
      button.addEventListener("click", () => {
        const color = button.dataset.color;

        if (selectedColors.length >= 2) {
          alert("You can only pick 2 colors.");
          return;
        }

        selectedColors.push(color);
        button.classList.add("selected");
        updateSelectedDisplay();
      });
    });

    mixBtn.addEventListener("click", () => {
      if (selectedColors.length !== 2) {
        resultText.textContent = "Please pick 2 colors first.";
        return;
      }

      const key = `${selectedColors[0]}-${selectedColors[1]}`;
      const result = mixMap[key];

      if (result) {
        bowl.style.background = result.color;
        bowl.style.color = result.textColor || "#222";
        bowl.textContent = result.name;
        resultText.textContent = `You made ${result.name}!`;
        showSparkle();
      } else {
        bowl.style.background = "#fafafa";
        bowl.style.color = "#444";
        bowl.textContent = "Oops!";
        resultText.textContent = "That mix is not available yet.";
      }
    });

    resetBtn.addEventListener("click", () => {
      clearSelections();
      bowl.style.background = "#fafafa";
      bowl.style.color = "#444";
      bowl.textContent = "Mix Here";
      resultText.textContent = "";
    });

    updateSelectedDisplay();
  </script>
</body>
</html>
